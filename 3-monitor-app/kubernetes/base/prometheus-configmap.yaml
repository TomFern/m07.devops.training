apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: replace-namespace
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'metrics_app'
        static_configs:
          - targets: ['metrics-app:8000']

      - job_name: 'grafana'
        static_configs:
          - targets: ['grafana:3000']
        metrics_path: /metrics